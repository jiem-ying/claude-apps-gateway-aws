AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Stands up a FRESH Amazon Cognito user pool, a hosted-UI domain, and a
  confidential OIDC web client for the Claude Apps Gateway, and stores the client
  secret in Secrets Manager. Use this when you don't already have an IdP. (If you
  already run a Cognito pool, use cognito-existing-pool.yaml instead; for Okta /
  Entra / Google / Keycloak, create a confidential web app there and pass its
  issuer/client_id/secret directly to the gateway stack.)

Parameters:
  GatewayHostname:
    Type: String
    Description: Gateway DNS name; the callback URL is https://<this>/oauth/callback
  HostedUiDomainPrefix:
    Type: String
    Description: Globally-unique prefix for the Cognito hosted-UI domain (<prefix>.auth.<region>.amazoncognito.com). Lowercase letters, digits and hyphens.
    AllowedPattern: "^[a-z0-9-]{3,63}$"
    ConstraintDescription: 3-63 chars, lowercase letters, digits and hyphens only.
  AdminEmail:
    Type: String
    Description: Email address for the initial admin user created in the pool (a temporary password is emailed on deploy).
  AdminUsername:
    Type: String
    Default: admin
    Description: Cognito username for the initial admin user, e.g. a short handle like 'alice'. Sign-in still uses AdminEmail (email is an alias).
  # RBAC demo groups. Membership flows to the gateway via the cognito:groups claim
  # (no app-client change needed) and drives managed.policies matching. Assign
  # users with `aws cognito-idp admin-add-user-to-group` (see idp/README.md).
  FullAccessGroupName:
    Type: String
    Default: platform
    Description: Group whose members get full model + tool access (matched by the gateway's catch-all policy).
  RestrictedGroupName:
    Type: String
    Default: partners
    Description: Group the gateway policy restricts (e.g. denies a tool). No models are removed unless you configure it to.

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    # Retain the pool on stack delete so you don't lose users by accident.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-pool"
      # Custom usernames (e.g. "alice") rather than forced UUIDs — CFN/CLI
      # callers set Username explicitly at creation. Email still works for
      # sign-in via AliasAttributes, and is verified so the `email` claim is
      # trustworthy. (UsernameAttributes=[email] would force UUID usernames and
      # is immutable post-creation — deliberately left unset.)
      AliasAttributes: [email]
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true   # invite-only; no self sign-up
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref HostedUiDomainPrefix
      UserPoolId: !Ref UserPool

  GatewayClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-gateway"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows: [code]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs:
        - !Sub "https://${GatewayHostname}/oauth/callback"
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows: [ALLOW_REFRESH_TOKEN_AUTH]
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      IdTokenValidity: 60
      AccessTokenValidity: 60
      RefreshTokenValidity: 720
      TokenValidityUnits:
        IdToken: minutes
        AccessToken: minutes
        RefreshToken: minutes

  AdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref AdminUsername
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - { Name: email, Value: !Ref AdminEmail }
        - { Name: email_verified, Value: "true" }

  # RBAC groups. Creating them is enough for the cognito:groups claim to carry a
  # user's membership once assigned; the gateway's managed.policies key on it.
  FullAccessGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: !Ref FullAccessGroupName
      Description: Full model + tool access (gateway catch-all policy).
  RestrictedGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: !Ref RestrictedGroupName
      Description: Restricted by a gateway managed policy (e.g. a denied tool).

  SecretStoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: cognito-and-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cognito-idp:DescribeUserPoolClient
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:DeleteSecret
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*"

  SecretStoreFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SecretStoreRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          # Self-contained CFN custom resource: vendors the response POST via
          # urllib so it doesn't depend on the `cfnresponse` module, which is not
          # bundled in the python3.12 runtime.
          import json, urllib.request
          import boto3

          def send(event, context, status, data, physical_id=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': f"See CloudWatch log stream {context.log_stream_name}",
                  'PhysicalResourceId': physical_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'NoEcho': False,
                  'Data': data,
              }).encode('utf-8')
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT',
                                           headers={'content-type': '', 'content-length': str(len(body))})
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  props = event['ResourceProperties']
                  secret_name = props['SecretName']
                  secrets = boto3.client('secretsmanager')
                  if event['RequestType'] == 'Delete':
                      try:
                          secrets.delete_secret(SecretId=secret_name,
                                                ForceDeleteWithoutRecovery=True)
                      except secrets.exceptions.ResourceNotFoundException:
                          pass
                      send(event, context, 'SUCCESS', {}, secret_name)
                      return
                  cognito = boto3.client('cognito-idp')
                  resp = cognito.describe_user_pool_client(
                      UserPoolId=props['UserPoolId'], ClientId=props['ClientId'])
                  client_secret = resp['UserPoolClient'].get('ClientSecret')
                  if not client_secret:
                      raise ValueError("client has no secret (GenerateSecret must be true)")
                  try:
                      arn = secrets.create_secret(Name=secret_name,
                          SecretString=client_secret,
                          Description="Claude Apps Gateway OIDC client secret")['ARN']
                  except secrets.exceptions.ResourceExistsException:
                      secrets.update_secret(SecretId=secret_name, SecretString=client_secret)
                      arn = secrets.describe_secret(SecretId=secret_name)['ARN']
                  send(event, context, 'SUCCESS', {'SecretArn': arn}, secret_name)
              except Exception as e:
                  print(f"error: {e}")
                  send(event, context, 'FAILED', {'Message': str(e)},
                       event.get('ResourceProperties', {}).get('SecretName'))

  GatewayClientSecret:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SecretStoreFunction.Arn
      UserPoolId: !Ref UserPool
      ClientId: !Ref GatewayClient
      SecretName: !Sub "${AWS::StackName}-oidc-client-secret"

Outputs:
  UserPoolId:
    Description: The new Cognito user pool id.
    Value: !Ref UserPool
  ClientId:
    Description: Pass as OidcClientId to claude-apps-gateway.yaml.
    Value: !Ref GatewayClient
  ClientSecretArn:
    Description: Pass as OidcClientSecretArn to claude-apps-gateway.yaml.
    Value: !GetAtt GatewayClientSecret.SecretArn
  Issuer:
    Description: Pass as OidcIssuer (used when rendering gateway.yaml).
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
  HostedUiDomain:
    Description: Cognito hosted-UI domain (sign-in page host).
    Value: !Sub "https://${HostedUiDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
