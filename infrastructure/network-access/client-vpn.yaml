AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  OPTIONAL reference add-on: an AWS Client VPN endpoint for reaching the Claude
  Apps Gateway's internal, private-only ALB from developer laptops. Mutual-TLS
  auth. Associates with the gateway VPC's private subnets and pushes the VPC .2
  resolver so the gateway's private hosted zone resolves (required for Claude
  Code's private-IP /login check).

  Deploy this ONLY if you have no existing private path into the gateway VPC. If
  you already have a corporate VPN, Direct Connect, Site-to-Site VPN, Transit
  Gateway, or VPC peering, you do NOT need this stack — instead route the gateway
  VPC CIDR over your existing connection, ensure the gateway's private DNS name
  resolves, and set the gateway stack's ClientCidr to your client range. See
  network-access/README.md.

Parameters:
  ServerCertificateArn:
    Type: String
    Description: ACM ARN of the VPN server certificate (see make-vpn-certs.sh).
  ClientRootCertificateArn:
    Type: String
    Description: ACM ARN of the client root (CA) certificate for mutual auth.
  ClientCidrBlock:
    Type: String
    Default: "10.30.0.0/22"
    Description: CIDR pool for VPN clients (must not overlap the VPC CIDR; must sit within the gateway stack's ClientCidr).
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Gateway VPC id (output VpcId of the gateway stack).
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet of the gateway VPC.
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet of the gateway VPC.
  VpcCidr:
    Type: String
    Default: "10.20.0.0/16"
    Description: Gateway VPC CIDR (authorization rule target; use the gateway stack's VpcCidr output).
  VpcDnsResolver:
    Type: String
    Default: "10.20.0.2"
    Description: The VPC's .2 Route 53 Resolver IP (VPC network base + 2), pushed to clients so the gateway's private zone resolves. If you change VpcCidr, change this to match (base + 2).

Resources:
  VpnLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/clientvpn/${AWS::StackName}"
      RetentionInDays: 14

  VpnSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AWS::StackName} Client VPN ENIs"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - Description: All egress into the VPC
          IpProtocol: "-1"
          CidrIp: !Ref VpcCidr
      Tags:
        - { Key: Name, Value: !Sub "${AWS::StackName}-vpn-sg" }

  ClientVpnEndpoint:
    Type: AWS::EC2::ClientVpnEndpoint
    Properties:
      Description: !Sub "${AWS::StackName} Claude Apps Gateway access"
      AuthenticationOptions:
        - Type: certificate-authentication
          MutualAuthentication:
            ClientRootCertificateChainArn: !Ref ClientRootCertificateArn
      ClientCidrBlock: !Ref ClientCidrBlock
      ServerCertificateArn: !Ref ServerCertificateArn
      ConnectionLogOptions:
        Enabled: true
        CloudwatchLogGroup: !Ref VpnLogGroup
      # Push the VPC's .2 Route 53 Resolver so the gateway's private hosted zone
      # resolves on connected clients (private-IP /login requirement).
      DnsServers:
        - !Ref VpcDnsResolver
      SplitTunnel: true
      TransportProtocol: udp
      VpcId: !Ref VpcId
      SecurityGroupIds:
        - !Ref VpnSecurityGroup
      TagSpecifications:
        - ResourceType: client-vpn-endpoint
          Tags:
            - { Key: Name, Value: !Sub "${AWS::StackName}-cvpn" }

  Assoc1:
    Type: AWS::EC2::ClientVpnTargetNetworkAssociation
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      SubnetId: !Ref SubnetId1

  Assoc2:
    Type: AWS::EC2::ClientVpnTargetNetworkAssociation
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      SubnetId: !Ref SubnetId2

  AuthorizeVpc:
    Type: AWS::EC2::ClientVpnAuthorizationRule
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      TargetNetworkCidr: !Ref VpcCidr
      AuthorizeAllGroups: true
      Description: Allow VPN clients to reach the gateway VPC

Outputs:
  ClientVpnEndpointId:
    Value: !Ref ClientVpnEndpoint
    Description: Download the client config with `aws ec2 export-client-vpn-client-configuration`.
